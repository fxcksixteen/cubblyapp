name: Prebuild Windows native addon

# Builds the win-audio-capture .node binary on a Windows runner so end users
# (and your local electron-builder) don't need Visual Studio installed.
# After a successful run, the workflow commits the produced .node files into
# `native/win-audio-capture/prebuilds/` on the same branch.
#
# Manual trigger: Actions tab → "Prebuild Windows native addon" → Run workflow.
# Auto-trigger: any push that touches the native source.

on:
  workflow_dispatch:
  push:
    paths:
      - 'native/win-audio-capture/**'
      - '.github/workflows/prebuild-native.yml'

permissions:
  contents: write

jobs:
  prebuild:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python 3.11 (node-gyp)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install node-gyp globally
        run: npm install -g node-gyp@10

      - name: Install native addon deps (incl. dev deps for prebuildify)
        working-directory: native/win-audio-capture
        env:
          npm_config_build_from_source: 'true'
        run: npm install --ignore-scripts --include=dev

      # N-API addons are ABI-stable across Node/Electron versions, so a single
      # NAPI build works for Electron 33, 41, and beyond. Targeting the actual
      # Electron version we ship (41) avoids any chance of header drift.
      - name: Prebuild for Electron 41 (x64, NAPI)
        working-directory: native/win-audio-capture
        env:
          npm_config_msvs_version: '2022'
        shell: cmd
        run: npx --no-install prebuildify --napi --strip -t electron@41.0.0 --arch=x64 --verbose

      - name: List prebuilds
        if: always()
        shell: cmd
        run: |
          if exist native\win-audio-capture\prebuilds (
            dir /s native\win-audio-capture\prebuilds
          ) else (
            echo No prebuilds directory was created.
            exit /b 1
          )

      - name: Commit prebuilds back to repo
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add native/win-audio-capture/prebuilds
          if git diff --cached --quiet; then
            echo "No prebuild changes to commit."
          else
            git commit -m "chore(native): prebuild win-audio-capture (NAPI, Electron 41) [skip ci]"
            # Push explicitly to refs/heads/<branch> so git doesn't try to update
            # a same-named tag (e.g. branch "v0.2.13" colliding with tag "v0.2.13").
            git push origin "HEAD:refs/heads/${GITHUB_REF_NAME}"
          fi
