  <body>
    <script>
      // Apply saved theme BEFORE React renders to prevent white flash
      try {
        var t = localStorage.getItem('cubbly-theme');
        if (t && ['default','onyx','white','cubbly'].includes(t)) {
          document.documentElement.setAttribute('data-theme', t);
        }
      } catch(e) {}
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
