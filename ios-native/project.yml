# XcodeGen manifest — run `xcodegen generate` to (re)create Cubbly.xcodeproj.
# This file is the source of truth; the .xcodeproj is generated and should
# not be hand-edited.

name: Cubbly
options:
  bundleIdPrefix: app.cubbly
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"  # iPhone + iPad
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    DEVELOPMENT_TEAM: ""  # set in Xcode UI

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.24.0"
  SVGKit:
    url: https://github.com/SVGKit/SVGKit
    from: "3.0.0"

targets:
  Cubbly:
    type: application
    platform: iOS
    sources:
      - path: Sources/Cubbly
    resources:
      - path: Resources/Assets.xcassets
      - path: Resources/Icons
      - path: Resources/Fonts
        optional: true
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: Cubbly
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: LaunchBackground
        UIBackgroundModes:
          - remote-notification
        NSPhotoLibraryUsageDescription: "Cubbly needs photo access so you can share images in chats."
        NSCameraUsageDescription: "Cubbly needs camera access so you can take photos to share in chats."
        NSMicrophoneUsageDescription: "Cubbly needs the microphone for voice calls."
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.cubbly.ios
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - package: Supabase
        product: Supabase
      - package: SVGKit
        product: SVGKit

  CubblyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/CubblyTests
    dependencies:
      - target: Cubbly
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.cubbly.ios.tests

schemes:
  Cubbly:
    build:
      targets:
        Cubbly: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CubblyTests
    archive:
      config: Release
