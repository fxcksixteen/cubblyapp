# XcodeGen manifest — run `xcodegen generate` to (re)create Cubbly.xcodeproj.
name: Cubbly
options:
  bundleIdPrefix: app.cubbly
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    DEVELOPMENT_TEAM: ""

fileGroups:
  - Package.swift
  - README.md
  - README_FIRST.md
  - RESOURCES_VERIFY.txt

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.24.0"
  SVGKit:
    url: https://github.com/SVGKit/SVGKit
    from: "3.0.0"
  # Same WebRTC engine that Chromium / Discord / Google Meet ship.
  # Pre-built XCFramework distributed by stasel — fully signed, supports
  # iOS 13+, voice + video, audio-unit AEC, hardware H.264.
  WebRTC:
    url: https://github.com/stasel/WebRTC
    from: "125.0.0"

targets:
  Cubbly:
    type: application
    platform: iOS
    sources:
      - path: Sources/Cubbly
      # Asset catalog (app icon, accent color, launch background, brand pngs).
      - path: Resources/Assets.xcassets
      # Folder references — guarantees every file inside ships even if the
      # user opens the .xcodeproj before re-running xcodegen. XcodeGen places
      # `type: folder` entries into the Resources build phase automatically.
      - path: Resources/Icons
        type: folder
        buildPhase: resources
      - path: Resources/Images
        type: folder
        buildPhase: resources
      - path: Resources/Videos
        type: folder
        buildPhase: resources
      - path: Resources/Fonts
        type: folder
        buildPhase: resources
      - path: Resources/Sounds
        type: folder
        buildPhase: resources
      - path: Resources/LaunchScreen.storyboard
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: Cubbly
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UIBackgroundModes:
          - remote-notification
          - audio
          - voip
        NSPhotoLibraryUsageDescription: "Cubbly needs photo access so you can share images in chats."
        NSCameraUsageDescription: "Cubbly needs camera access so you can take photos to share in chats."
        NSMicrophoneUsageDescription: "Cubbly needs the microphone for voice calls."
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen:
          UIColorName: LaunchBackground
          UIImageName: cubbly-nobg
          UIImageRespectsSafeAreaInsets: false
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Register bundled Nunito TTFs. Paths are relative to the bundle root —
        # since `Resources/Fonts` is shipped as a folder reference, the TTFs
        # end up under `Fonts/…` inside the .app.
        UIAppFonts:
          - Fonts/Nunito-Black.ttf
          - Fonts/Nunito-BlackItalic.ttf
          - Fonts/Nunito-Bold.ttf
          - Fonts/Nunito-BoldItalic.ttf
          - Fonts/Nunito-ExtraBold.ttf
          - Fonts/Nunito-ExtraBoldItalic.ttf
          - Fonts/Nunito-Light.ttf
          - Fonts/Nunito-LightItalic.ttf
          - Fonts/Nunito-Medium.ttf
          - Fonts/Nunito-MediumItalic.ttf
          - Fonts/Nunito-Regular.ttf
          - Fonts/Nunito-RegularItalic.ttf
          - Fonts/Nunito-SemiBold.ttf
          - Fonts/Nunito-SemiBoldItalic.ttf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.cubbly.ios
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # Push Notifications capability — needs `aps-environment` in the
        # entitlements file (Cubbly.entitlements) AND the matching capability
        # added to the App ID in your Apple Developer account.
        CODE_SIGN_ENTITLEMENTS: Cubbly.entitlements
    # NOTE: do NOT add an `entitlements:` block here. XcodeGen would then
    # regenerate Cubbly.entitlements during project generation, and Xcode
    # detects the file changing mid-build and aborts with:
    #   "Entitlements file ... was modified during the build, which is not
    #    supported."
    # We ship the entitlements file by hand so it stays stable.
    dependencies:
      - package: Supabase
        product: Supabase
      - package: SVGKit
        product: SVGKit
      - package: WebRTC
        product: WebRTC

  CubblyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/CubblyTests
    dependencies:
      - target: Cubbly
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.cubbly.ios.tests

schemes:
  Cubbly:
    build:
      targets:
        Cubbly: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CubblyTests
    archive:
      config: Release
